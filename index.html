<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Time Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root{--bg:#131722;--card:#1b2130;--muted:#9ca8c0;--text:#edf1ff;--primary:#4c8dff;--line:#2a3348;--ok:#3ac58f;--warn:#ffb34d;--danger:#ff6b6b}
    *{box-sizing:border-box} html,body{height:100%;overflow:hidden} body{margin:0;font-family:Inter,system-ui;background:var(--bg);color:var(--text)}
    .app{height:100vh;display:flex;overflow:hidden}
    .sidebar{width:250px;background:var(--card);border-right:1px solid var(--line);display:flex;flex-direction:column;transition:.2s}
    .sidebar.compact{width:74px}.sidebar.hidden{width:0;border-right:0;overflow:hidden}
    .brand{padding:14px;display:flex;align-items:center;gap:10px;font-weight:700}.brand i{color:var(--primary)} .brand span{white-space:nowrap}
    .sidebar.compact .brand span,.sidebar.compact .nav span{display:none}
    .nav{padding:8px;display:flex;flex-direction:column;gap:6px}.nav button{height:38px;border:0;background:transparent;color:var(--muted);border-radius:10px;display:flex;align-items:center;gap:10px;padding:0 10px;cursor:pointer}.nav button.active,.nav button:hover{background:#232c40;color:var(--text)}
    .main{flex:1;display:flex;flex-direction:column;overflow:hidden}
    .header{height:58px;display:flex;align-items:center;justify-content:space-between;padding:0 12px;border-bottom:1px solid var(--line);background:var(--card)}
    .header .left,.header .right{display:flex;align-items:center;gap:8px}
    .icon{width:34px;height:34px;border:1px solid var(--line);background:#212a3d;border-radius:10px;color:var(--text);display:grid;place-items:center;cursor:pointer}
    .select,.input{height:34px;border-radius:10px;border:1px solid var(--line);background:#212a3d;color:var(--text);padding:0 10px}
    .content{flex:1;padding:10px;overflow:hidden}
    .dashboard{height:100%;display:grid;grid-template-rows:auto auto 1fr;gap:10px}
    .kpis{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:12px;min-height:0}
    .card.pad{padding:10px}.kpi .v{font-size:24px;font-weight:700}.muted{color:var(--muted);font-size:12px}
    .charts{display:grid;grid-template-columns:1.4fr 1fr 1fr;gap:10px;min-height:0}
    .bottom{display:grid;grid-template-columns:1fr 1fr;gap:10px;min-height:0}
    .scroller{overflow:auto}
    .scroller::-webkit-scrollbar{width:8px;height:8px}.scroller::-webkit-scrollbar-thumb{background:#405172;border-radius:8px}.scroller::-webkit-scrollbar-track{background:#1b2233}
    .project-list,.day-list{display:flex;flex-direction:column;gap:8px;padding:8px}
    .project-item{display:flex;justify-content:space-between;border:1px solid var(--line);border-radius:10px;padding:8px}
    .badge{font-size:11px;padding:2px 7px;border-radius:999px;background:#26314b;color:#aecdff}
    .reports{display:none;height:100%}.reports.active{display:block}
    .dashboard.hidden{display:none}
    details{border:1px solid var(--line);border-radius:10px;padding:8px;background:#1a2234} details summary{cursor:pointer}
    .entry{margin-top:6px;border-top:1px dashed var(--line);padding-top:6px;font-size:12px;display:flex;justify-content:space-between;gap:8px}
    .auth{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;place-items:center}.auth.show{display:grid}
    .authBox{width:420px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;display:flex;flex-direction:column;gap:8px}
    .accounts{max-height:130px;overflow:auto;display:flex;flex-direction:column;gap:6px}
    .acc{display:flex;justify-content:space-between;gap:8px;border:1px solid var(--line);padding:6px;border-radius:9px}
  </style>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="brand"><i data-lucide="clock-3"></i><span>Time Tracker</span></div>
    <div class="nav">
      <button class="active" data-view="dashboard"><i data-lucide="layout-dashboard"></i><span>Visão geral</span></button>
      <button data-view="reports"><i data-lucide="file-text"></i><span>Relatórios</span></button>
    </div>
  </aside>
  <section class="main">
    <header class="header">
      <div class="left">
        <button class="icon" id="toggleSide"><i data-lucide="panel-left"></i></button>
        <button class="icon" id="hideSide"><i data-lucide="panel-left-close"></i></button>
        <button class="icon" id="prevMonth"><i data-lucide="chevron-left"></i></button>
        <div id="monthLabel"></div>
        <button class="icon" id="nextMonth"><i data-lucide="chevron-right"></i></button>
        <select class="select" id="project"></select>
      </div>
      <div class="right">
        <button class="icon" id="openAuth"><i data-lucide="user-cog"></i></button>
        <button class="icon" id="logout"><i data-lucide="log-out"></i></button>
      </div>
    </header>
    <main class="content">
      <div class="dashboard" id="dashboard">
        <div class="kpis">
          <div class="card pad kpi"><div class="muted">Horas do mês</div><div class="v" id="kTotal">00:00</div></div>
          <div class="card pad kpi"><div class="muted">Cartões com horas</div><div class="v" id="kCards">0</div></div>
          <div class="card pad kpi"><div class="muted">Média diária</div><div class="v" id="kAvg">00:00</div></div>
          <div class="card pad kpi"><div class="muted">Progresso do mês</div><div class="v" id="kPct">0%</div></div>
        </div>
        <div class="charts">
          <div class="card pad"><div>Horas por dia</div><canvas id="cDaily"></canvas></div>
          <div class="card pad"><div>Cartões revisados</div><canvas id="cReview"></canvas></div>
          <div class="card scroller"><div class="project-list" id="projectDist"></div></div>
        </div>
        <div class="bottom">
          <div class="card pad"><div>Progresso do mês</div><div class="muted" id="progressText"></div></div>
          <div class="card pad"><div>Últimas atividades</div><div class="scroller day-list" id="activity" style="max-height:100%"></div></div>
        </div>
      </div>
      <div class="reports" id="reports"><div class="card scroller" style="height:100%"><div class="day-list" id="dailyDetails"></div></div></div>
    </main>
  </section>
</div>

<div class="auth" id="authModal">
  <div class="authBox">
    <strong>Conexão Jira</strong>
    <input class="input" id="baseUrl" placeholder="https://empresa.atlassian.net"/>
    <input class="input" id="email" placeholder="email"/>
    <input class="input" id="token" placeholder="token"/>
    <button class="icon" id="saveAccount" style="width:100%;height:36px">Salvar e entrar</button>
    <div class="muted">Contas salvas</div>
    <div class="accounts" id="accounts"></div>
  </div>
</div>

<script>
const qs=id=>document.getElementById(id); const fmt2=n=>String(n).padStart(2,'0');
const toHM=hours=>{const m=Math.round((Number(hours)||0)*60);return `${fmt2(Math.floor(m/60))}:${fmt2(m%60)}`};
const fromSec=sec=>`${fmt2(Math.floor(sec/3600))}:${fmt2(Math.floor((sec%3600)/60))}`;
const today=()=>new Date().toISOString().slice(0,10);
const firstDay=(d)=>new Date(d.getFullYear(),d.getMonth(),1).toISOString().slice(0,10);
let chartDaily,chartReview,state={month:new Date(),project:'all',payload:null,account:null,view:'dashboard'};

const STORAGE_KEYS={accounts:'jiraAccountsEnc',active:'activeJiraAccountEnc'};
const APP_SECRET='time-jira-local-v1';
const te=new TextEncoder(), td=new TextDecoder();
function b64(buf){return btoa(String.fromCharCode(...new Uint8Array(buf)));}
function unb64(str){return Uint8Array.from(atob(str),c=>c.charCodeAt(0));}
async function deriveKey(salt){
  const baseKey=await crypto.subtle.importKey('raw',te.encode(APP_SECRET+location.origin),'PBKDF2',false,['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2',salt:te.encode(salt),iterations:120000,hash:'SHA-256'},baseKey,{name:'AES-GCM',length:256},false,['encrypt','decrypt']);
}
async function encryptText(plain,salt){
  const iv=crypto.getRandomValues(new Uint8Array(12));
  const key=await deriveKey(salt);
  const ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},key,te.encode(plain));
  return JSON.stringify({iv:b64(iv),ct:b64(ct)});
}
async function decryptText(payload,salt){
  const obj=JSON.parse(payload||'{}');
  if(!obj.iv||!obj.ct) throw new Error('payload invalido');
  const key=await deriveKey(salt);
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:unb64(obj.iv)},key,unb64(obj.ct));
  return td.decode(pt);
}
function accountSalt(a){return `${a?.baseUrl||''}|${a?.email||''}`}
function icon(){try{lucide.createIcons()}catch{}}
function monthRange(){const d=state.month, now=new Date();const from=firstDay(d);const same=d.getFullYear()===now.getFullYear()&&d.getMonth()===now.getMonth();const to=same?today():new Date(d.getFullYear(),d.getMonth()+1,0).toISOString().slice(0,10);return {from,to};}
function accountHeaders(){if(!state.account) throw new Error('Configure um usuário');return {'x-jira-base-url':state.account.baseUrl,'x-jira-email':state.account.email,'x-jira-token':state.account.token};}
async function api(path){const r=await fetch(path,{headers:accountHeaders()});const j=await r.json();if(!r.ok||!j.ok) throw new Error(j.error||'Falha');return j;}
function setSidebarMode(mode){localStorage.setItem('sidebarMode',mode);const s=qs('sidebar');s.className='sidebar'+(mode==='compact'?' compact':'')+(mode==='hidden'?' hidden':'');}
function loadSidebarMode(){setSidebarMode(localStorage.getItem('sidebarMode')||'compact');}
async function accounts(){
  const raw=localStorage.getItem(STORAGE_KEYS.accounts);
  if(!raw) return [];
  try{
    const envelope=JSON.parse(raw);
    const plain=await decryptText(envelope.payload,envelope.salt||'accounts');
    return JSON.parse(plain);
  }catch{return [];}
}
async function saveAccounts(v){
  const payload=await encryptText(JSON.stringify(v),'accounts');
  localStorage.setItem(STORAGE_KEYS.accounts,JSON.stringify({salt:'accounts',payload}));
}
async function saveActiveAccount(a){
  const payload=await encryptText(JSON.stringify(a),accountSalt(a));
  localStorage.setItem(STORAGE_KEYS.active,JSON.stringify({salt:accountSalt(a),payload}));
}
async function readActiveAccount(){
  const raw=localStorage.getItem(STORAGE_KEYS.active);
  if(!raw) return null;
  try{
    const envelope=JSON.parse(raw);
    const plain=await decryptText(envelope.payload,envelope.salt||'');
    return JSON.parse(plain);
  }catch{return null;}
}
async function renderAccounts(){
  const list=await accounts();
  qs('accounts').innerHTML=list.map((a,i)=>`<div class='acc'><span>${a.email}</span><div><button onclick='useAcc(${i})'>usar</button><button onclick='delAcc(${i})'>x</button></div></div>`).join('');
}
window.useAcc=async(i)=>{const list=await accounts();state.account=list[i];if(!state.account) return;await saveActiveAccount(state.account);qs('authModal').classList.remove('show');loadAll()}
window.delAcc=async(i)=>{const a=await accounts();a.splice(i,1);await saveAccounts(a);await renderAccounts()}
async function ensureAuth(){const active=await readActiveAccount();if(active){state.account=active}else qs('authModal').classList.add('show');await renderAccounts();}
async function loadProjects(){const j=await api('/api/projects');const sel=qs('project');sel.innerHTML='<option value="all">Todos projetos</option>'+j.projects.map(p=>`<option value='${p.key}'>${p.name}</option>`).join('');sel.value=state.project;}
function render(d){state.payload=d;qs('monthLabel').textContent=new Intl.DateTimeFormat('pt-BR',{month:'long',year:'numeric'}).format(state.month);qs('kTotal').textContent=toHM(d.totals.totalHours);qs('kCards').textContent=d.counts.cardsWithHours;qs('kAvg').textContent=toHM(d.totals.avgDaily);qs('kPct').textContent=`${d.sprintProgress.percentComplete}%`;qs('progressText').textContent=`${toHM(d.sprintProgress.loggedHours)} de ${toHM(d.sprintProgress.estimateHours)} (${toHM(d.sprintProgress.remainingHours)} restantes)`;
  if(chartDaily) chartDaily.destroy(); if(chartReview) chartReview.destroy();
  chartDaily=new Chart(qs('cDaily'),{type:'bar',data:{labels:d.dailyHoursChart.map(x=>x.day),datasets:[{data:d.dailyHoursChart.map(x=>x.logged),backgroundColor:'#4c8dff'}]},options:{plugins:{legend:{display:false}},maintainAspectRatio:false}});
  chartReview=new Chart(qs('cReview'),{type:'line',data:{labels:d.reviewedCardsChart.map(x=>x.label),datasets:[{data:d.reviewedCardsChart.map(x=>x.reviewed),borderColor:'#3ac58f'}]},options:{plugins:{legend:{display:false}},maintainAspectRatio:false}});
  qs('projectDist').innerHTML=d.projectDistribution.map(p=>`<div class='project-item'><span>${p.name}</span><span>${toHM(p.hours)}</span></div>`).join('')||'<div class="muted">Sem dados</div>';
  qs('activity').innerHTML=(d.recentActivity||[]).map(a=>`<div class='project-item'><span>${a.key}</span><span>${toHM(a.hours)}</span></div>`).join('');
  qs('dailyDetails').innerHTML=(d.dailyDetails||[]).map(day=>`<details><summary>${day.date} • ${day.formatted}</summary>${day.entries.map(e=>`<div class='entry'><div><strong>${e.key}</strong> ${e.title}<div class='muted'>${e.comment||''}</div></div><div>${e.formatted}</div></div>`).join('')}</details>`).join('')||'<div class="muted">Sem lançamentos no período.</div>';
}
async function loadAll(){const {from,to}=monthRange();const q=new URLSearchParams({from,to,tz:'America/Sao_Paulo',project:state.project,author:'auto',mode:'auto',c:'5'});await loadProjects();const data=await api('/api/hours?'+q.toString());render(data);}
qs('prevMonth').onclick=()=>{state.month=new Date(state.month.getFullYear(),state.month.getMonth()-1,1);loadAll()};
qs('nextMonth').onclick=()=>{state.month=new Date(state.month.getFullYear(),state.month.getMonth()+1,1);loadAll()};
qs('project').onchange=e=>{state.project=e.target.value;loadAll()};
qs('toggleSide').onclick=()=>{const s=qs('sidebar');setSidebarMode(s.classList.contains('compact')?'expanded':'compact')};
qs('hideSide').onclick=()=>{setSidebarMode('hidden')};
qs('openAuth').onclick=()=>qs('authModal').classList.add('show');
qs('logout').onclick=()=>{localStorage.removeItem(STORAGE_KEYS.active);state.account=null;qs('authModal').classList.add('show')};
qs('saveAccount').onclick=async()=>{const a={baseUrl:qs('baseUrl').value.trim(),email:qs('email').value.trim(),token:qs('token').value.trim()};if(!a.baseUrl||!a.email||!a.token)return;const arr=(await accounts()).filter(x=>!(x.baseUrl===a.baseUrl&&x.email===a.email));arr.unshift(a);await saveAccounts(arr);state.account=a;await saveActiveAccount(a);await renderAccounts();qs('authModal').classList.remove('show');loadAll()};
for(const b of document.querySelectorAll('.nav button')) b.onclick=()=>{document.querySelectorAll('.nav button').forEach(x=>x.classList.remove('active'));b.classList.add('active');const v=b.dataset.view;qs('dashboard').classList.toggle('hidden',v!=='dashboard');qs('reports').classList.toggle('active',v==='reports')}
(async()=>{await ensureAuth();loadSidebarMode();icon();if(state.account) loadAll();})();
</script>
</body>
</html>
